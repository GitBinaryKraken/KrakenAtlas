name: Bad recommendation
description: Report a where-to-add, flow, search, or relationship result that pointed an agent at the wrong files.
title: "[Recommendation] "
labels: ["alpha-feedback", "query-quality"]
body:
  - type: textarea
    id: query
    attributes:
      label: Query or Command Palette action
      description: Paste the exact command or describe the Command Palette action and prompt.
      placeholder: kraken-atlas query where-to-add "add validation for profile setup" --workspace . --context WebUI --format agent
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Kraken Atlas output
      description: Paste the relevant Answer, Open These Files, Evidence, and Next Commands sections. Remove secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: Which files, relationships, or next commands should have appeared instead?
    validations:
      required: true
  - type: input
    id: context
    attributes:
      label: Context value
      description: The --context value, if any.
      placeholder: WebUI
  - type: dropdown
    id: project_type
    attributes:
      label: Project type
      options:
        - ASP.NET Core MVC
        - Razor Pages
        - Minimal API
        - Class library
        - Vanilla JS/HTML/Razor
        - Multi-project solution
        - Other
  - type: textarea
    id: doctor
    attributes:
      label: doctor --format agent output
      description: Paste the doctor output if available.

