name: Token or context noise
description: Report output that is too large, repetitive, or not useful for an AI agent.
title: "[Token Noise] "
labels: ["alpha-feedback", "token-reduction"]
body:
  - type: textarea
    id: command
    attributes:
      label: Query
      description: Paste the exact command or Command Palette prompt.
    validations:
      required: true
  - type: textarea
    id: noisy_output
    attributes:
      label: Noisy output
      description: Paste the repetitive or oversized section.
    validations:
      required: true
  - type: textarea
    id: why_noisy
    attributes:
      label: Why it wasted context
      description: Explain what an AI agent did not need, or what next command was misleading.
    validations:
      required: true
  - type: textarea
    id: better_output
    attributes:
      label: Better output
      description: What should Kraken Atlas show or hide instead?

