name: Setup or install problem
description: Report an install, rebuild, update, CLI setup, or doctor problem.
title: "[Setup] "
labels: ["alpha-feedback", "setup"]
body:
  - type: textarea
    id: action
    attributes:
      label: What you tried
      description: Command Palette action or terminal command.
      placeholder: Kraken Atlas: Rebuild Map From Workspace
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error or output
      description: Paste the visible error, output channel text, or terminal output.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Kraken Atlas, VS Code, Node.js, .NET SDK, and OS if known.
      placeholder: Kraken Atlas 0.1.12, VS Code 1.xx, Node 20.x, .NET 9.x, Windows 11
  - type: textarea
    id: doctor
    attributes:
      label: doctor --format agent output
      description: Paste this if the CLI works.

